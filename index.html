<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Bob — Head Bobber at Delinea</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .logo {
            width: 160px;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b894, #006d5b);
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .title {
            font-size: 0.95rem;
            color: #00b894;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .tagline {
            font-size: 0.9rem;
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.875rem 1.25rem;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            background: #111111;
        }

        .links a:hover {
            background: #1a1a1a;
            border-color: #00b894;
            transform: translateY(-1px);
        }

        .links a svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <img
