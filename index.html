<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Bob — Head Bobber at Delinea | Cybersecurity Leader</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- Theme variables --- */
        :root {
            --accent: #00b894;
            --accent-dark: #006d5b;
            --transition-speed: 0.3s;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --card-bg: #111111;
            --card-border: #2a2a2a;
            --card-hover-bg: #1a1a1a;
            --footer-color: #555;
            --toggle-bg: #222;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --text: #1a1a1a;
            --text-muted: #666;
            --card-bg: #ffffff;
            --card-border: #e0e0e0;
            --card-hover-bg: #f0faf7;
            --footer-color: #aaa;
            --toggle-bg: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-speed), color var(--transition-speed);
        }

        .container {
            max-width: 420px;
            width: 100%;
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
        }

        /* --- Theme toggle --- */
        .theme-toggle {
            position: absolute;
            top: 1rem;
            right: 0.5rem;
            background: var(--toggle-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-speed), border-color var(--transition-speed);
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            color: var(--text);
            transition: color var(--transition-speed);
        }

        .theme-toggle .icon-moon { display: none; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: block; }
        [data-theme="light"] .theme-toggle .icon-sun { display: block; }
        [data-theme="light"] .theme-toggle .icon-moon { display: none; }

        /* --- Logo --- */
        .logo {
            width: 160px;
            margin-bottom: 2rem;
        }

        [data-theme="light"] .logo {
            filter: brightness(0.3);
        }

        /* --- Avatar --- */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .title {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
            transition: color var(--transition-speed);
        }

        /* --- Link cards --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.875rem 1.25rem;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            background: var(--card-bg);
            transition: background var(--transition-speed), border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .links a:hover {
            background: var(--card-hover-bg);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 184, 148, 0.15);
        }

        .links a svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: var(--footer-color);
            transition: color var(--transition-speed);
        }

        /* --- Entrance animations --- */
        .animate-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeSlideIn 0.5s ease forwards;
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in:nth-child(1) { animation-delay: 0.05s; }
        .animate-in:nth-child(2) { animation-delay: 0.12s; }
        .animate-in:nth-child(3) { animation-delay: 0.19s; }
        .animate-in:nth-child(4) { animation-delay: 0.26s; }
        .animate-in:nth-child(5) { animation-delay: 0.33s; }
        .animate-in:nth-child(6) { animation-delay: 0.40s; }
        .animate-in:nth-child(7) { animation-delay: 0.47s; }
        .animate-in:nth-child(8) { animation-delay: 0.54s; }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle animate-in" onclick="toggleTheme()" aria-label="Toggle dark/light mode">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
            </svg>
        </button>

        <img
            src="https://delinea.com/hubfs/Delinea/logos/Wordmark/delinea-logo-wordmark-web-green.svg"
            alt="Delinea"
            class="logo animate-in"
        />

        <div class="avatar animate-in">JB</div>

        <h1 class="animate-in">Joe Bob</h1>
        <p class="title animate-in">Head Bobber at Delinea</p>
        <p class="tagline animate-in">Bridging the gap between cybersecurity and business — one demo at a time.</p>

        <div class="links">
            <a href="https://www.calendly.com" target="_blank" rel="noopener noreferrer" class="animate-in">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Book a Meeting
            </a>

            <a href="https://www.linked.com" target="_blank" rel="noopener noreferrer" class="animate-in">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                LinkedIn
            </a>

            <a href="https://www.delinea.com" target="_blank" rel="noopener noreferrer" class="animate-in">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                Delinea.com
            </a>
        </div>

        <p class="footer animate-in">&copy; 2026 Joe Bob</p>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // Restore saved preference
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>
</body>
</html>
